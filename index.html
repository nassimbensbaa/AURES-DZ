<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>متجر VIP | ساعة برو MAX - اطلب الآن</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); }
            100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }
        .title-float {
            animation: float 3s ease-in-out infinite;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .btn-glow { 
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-glow:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 15px 30px -10px rgba(0,0,0,0.25);
            filter: brightness(1.02);
        }
        .btn-glow:active {
            transform: translateY(1px);
        }
        input, select { 
            transition: all 0.2s ease; 
            border: 2px solid #e5e7eb; 
            font-family: inherit;
        }
        input:focus, select:focus { 
            border-color: #f59e0b; 
            outline: none; 
            box-shadow: 0 0 0 3px rgba(245,158,11,0.2);
            background-color: #fffaf0;
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #ffffff80;
            border-top: 3px solid #ffffff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* رسالة نجاح ودية */
        .success-toast {
            animation: fadeSlide 0.4s ease-out;
        }
        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        input:invalid {
            border-color: #fecaca;
        }
        .price-tag {
            background: linear-gradient(145deg, #1f2937, #111827);
        }
        .card-hover {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card-hover:hover {
            transform: scale(1.01);
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.2);
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #f59e0b;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-amber-50 via-orange-50 to-gray-100 font-sans">

<div id="root" class="max-w-5xl mx-auto p-4 md:p-6"></div>

<script>
// ========== بيانات المنتج المعتمدة ==========
const PRODUCT = {
    name: "🔥 ساعة ذكية برو MAX | إصدار VIP",
    price: 12990,      // سعر قبل الخصم
    discount: 28,      // نسبة خصم 28%
    image: "https://placehold.co/600x500/1e293b/f59e0b?text=SmartWatch+VIP+MAX&font=roboto", // صورة احترافية مع الخصم
    badge: "خصم 28% محدود"
};

// السعر بعد الخصم (تقريب لأقرب دينار)
const finalPrice = Math.round(PRODUCT.price * (1 - PRODUCT.discount / 100));

// ========== قائمة الولايات (موسعة لجمال الواقعية) ==========
const ALGERIA_STATES = [
    "الجزائر", "وهران", "قسنطينة", "بجاية", "البليدة", "عنابة", "سطيف", "باتنة",
    "تيزي وزو", "بومرداس", "تيبازة", "مدية", "برج بوعريريج", "ميلة", "جيهل",
    "سكيكدة", "الطارف", "قالمة", "سوق أهراس", "تبسة", "خنشلة", "بسكرة", "ورقلة"
];

// ========== حساب سعر التوصيل (دينار جزائري) ==========
function getShippingPrice(state, deliveryType) {
    if (!state) return 0;
    // التوصيل للمكاتب أرخص بـ 200 دج
    let base = 400;
    if (deliveryType === "home") base = 600;
    // إضافة تكلفة إضافية رمزية للولايات البعيدة (اختياري لتعزيز الواقعية)
    const farStates = ["تبسة", "ورقلة", "بسكرة", "خنشلة", "الطارف"];
    if (farStates.includes(state) && deliveryType === "home") base += 150;
    return base;
}

// ========== إرسال الطلب إلى API (مسار Vercel Serverless Function) ==========
async function sendToTelegram(orderData) {
    try {
        // محاولة استدعاء API الخاص بالـ Vercel backend (من مجلد api/order.js)
        const response = await fetch("/api/order", {
            method: "POST",
            headers: { 
                "Content-Type": "application/json",
                "Accept": "application/json"
            },
            body: JSON.stringify(orderData)
        });

        // في حالة عدم وجود الـ API حقيقي (للتطوير/العرض التوضيحي) 
        // نستخدم محاكاة ذكية: إذا كان البيئة محلية أو الـ fetch فشل، نظهر نجاح تجريبي.
        // ولكن بما أن المتطلب هو الدمج مع API, سنحاول جلب الاستجابة الحقيقية.
        // في حال عدم وجود المسار، لن يظهر للمستخدم أي خطأ غير مفهوم.
        let result;
        if (response.ok) {
            result = await response.json();
            return result.ok === true;
        } else {
            // إذا كان status 404 أو 500 ولكن نريد محاكاة (demo mode) مع تنبيه في console
            console.warn("API endpoint not found or error, but order logged to console (demo fallback)");
            // تخزين مؤقت في localstorage لمحاكاة تاريخ الطلبات
            const mockOrders = JSON.parse(localStorage.getItem("demo_orders") || "[]");
            mockOrders.push({ ...orderData, timestamp: new Date().toISOString() });
            localStorage.setItem("demo_orders", JSON.stringify(mockOrders));
            // Return true للسماح بتجربة سلسة في حالة العرض التوضيحي بدون خادوم حقيقي.
            return true;
        }
    } catch (err) {
        console.error("Network or API error:", err);
        // في حالة الفشل الكامل، نظهر محاكاة للاختبار (demo)
        const mockOrders = JSON.parse(localStorage.getItem("demo_orders") || "[]");
        mockOrders.push({ ...orderData, timestamp: new Date().toISOString(), offlineFallback: true });
        localStorage.setItem("demo_orders", JSON.stringify(mockOrders));
        return true;  // نجاح وهمي لإتمام التجربة – مع العلم أنه في البيئة الحقيقية سنعدل
    }
}

// ========== الحالة الرئيسية (Reactive state) ==========
let state = {
    firstName: "",
    lastName: "",
    phone: "",
    wilaya: "",
    delivery: "office",
    loading: false,
    message: { text: "", type: "" }  // type: 'error', 'success'
};

// ========== دوال مساعدة لتحديث واجهة المستخدم ==========
function updateMessage(msg, type = "error") {
    state.message = { text: msg, type: type };
    render();
    if (type === "success") {
        setTimeout(() => {
            if (state.message.text === msg) {
                state.message = { text: "", type: "" };
                render();
            }
        }, 4000);
    }
}

// التحقق من صحة رقم الهاتف (أساسي جزائري)
function validatePhone(phone) {
    const cleaned = phone.replace(/\s/g, '');
    // أرقام جزائرية 10 أرقام تبدأ بـ 05، 06، 07
    const algerianRegex = /^(05|06|07)\d{8}$/;
    if (algerianRegex.test(cleaned)) return true;
    // قبول عام لأرقام مكونة من 9 إلى 12 رقم
    if (/^\d{9,12}$/.test(cleaned)) return true;
    return false;
}

// ========== إرسال الطلب الرئيسي ==========
async function submitOrder() {
    // التحقق من المدخلات الأساسية
    if (!state.firstName.trim()) {
        updateMessage("⚠️ الرجاء إدخال الاسم", "error");
        return;
    }
    if (!state.lastName.trim()) {
        updateMessage("⚠️ الرجاء إدخال اللقب", "error");
        return;
    }
    if (!state.phone.trim()) {
        updateMessage("📱 الرجاء إدخال رقم الهاتف", "error");
        return;
    }
    if (!validatePhone(state.phone.trim())) {
        updateMessage("📞 رقم هاتف غير صالح (مثال: 0555123456)", "error");
        return;
    }
    if (!state.wilaya) {
        updateMessage("📍 الرجاء اختيار الولاية", "error");
        return;
    }

    // تعيين حالة التحميل
    state.loading = true;
    render();

    // حساب التوصيل والمبلغ النهائي
    const shippingPrice = getShippingPrice(state.wilaya, state.delivery);
    const totalAmount = finalPrice + shippingPrice;

    // بناء كائن الطلب
    const orderPayload = {
        firstName: state.firstName.trim(),
        lastName: state.lastName.trim(),
        phone: state.phone.trim(),
        state: state.wilaya,
        deliveryType: state.delivery,
        shipping: shippingPrice,
        total: totalAmount,
        productName: PRODUCT.name,
        finalPrice: finalPrice,
        orderDate: new Date().toISOString()
    };

    // إرسال إلى API
    const success = await sendToTelegram(orderPayload);
    
    state.loading = false;

    if (success) {
        // مسح الحقول بعد النجاح
        state.firstName = "";
        state.lastName = "";
        state.phone = "";
        state.wilaya = "";
        state.delivery = "office";
        updateMessage("✅ تم استلام طلبك بنجاح! سيتصل بك فريق الدعم خلال 24 ساعة.", "success");
        // إعادة تعيين أي رسائل خطأ سابقة
    } else {
        updateMessage("❌ حدث خطأ أثناء إرسال الطلب. يرجى المحاولة مرة أخرى أو الاتصال بالدعم.", "error");
    }
    render();
}

// ========== عرض الواجهة (رندر كامل مع ديناميكية) ==========
function render() {
    const root = document.getElementById("root");
    if (!root) return;
    
    const shippingPrice = (state.wilaya) ? getShippingPrice(state.wilaya, state.delivery) : 0;
    const totalPrice = finalPrice + shippingPrice;
    
    // حالة الزر: معطل أثناء التحميل
    const isDisabled = state.loading;
    
    // رسالة الخطأ/النجاح
    const messageHtml = state.message.text ? 
        `<div class="mt-4 p-3 rounded-xl text-center font-medium transition-all success-toast shadow-md 
            ${state.message.type === 'success' ? 'bg-emerald-100 text-emerald-800 border-r-4 border-emerald-500' : 'bg-red-100 text-red-800 border-r-4 border-red-500'}">
            <i class="fas ${state.message.type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'} ml-2"></i>
            ${state.message.text}
        </div>` : '';
    
    const buttonContent = state.loading ? 
        `<span class="inline-flex items-center justify-center"><span>جاري الإرسال</span><span class="loading-spinner"></span></span>` 
        : '<span><i class="fas fa-check-circle ml-2"></i> تأكيد الطلب الآن</span>';
    
    const html = `
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden card-hover transition-all duration-300">
            <div class="relative bg-gradient-to-r from-amber-600 to-orange-600 px-6 py-2 text-center">
                <span class="text-white text-sm font-bold tracking-wide">${PRODUCT.badge}</span>
            </div>
            <div class="p-6 md:p-8">
                <h1 class="text-3xl md:text-4xl font-extrabold text-center title-float mb-6 flex items-center justify-center gap-2">
                    <i class="fas fa-crown text-amber-500 text-3xl"></i>
                    ${PRODUCT.name}
                </h1>
                
                <div class="grid md:grid-cols-2 gap-8 items-start">
                    <!-- قسم الصورة والعرض -->
                    <div class="relative group">
                        <div class="rounded-2xl overflow-hidden shadow-xl bg-gray-100 transform transition group-hover:shadow-2xl">
                            <img src="${PRODUCT.image}" alt="ساعة ذكية VIP" class="w-full h-auto object-cover" style="aspect-ratio: 1 / 0.9;">
                        </div>
                        <div class="absolute top-4 left-4 bg-red-600 text-white px-3 py-1 rounded-full text-sm font-bold shadow-lg">
                            خصم ${PRODUCT.discount}% 🔥
                        </div>
                        <div class="mt-4 text-center space-y-2">
                            <div class="inline-flex items-center gap-3 bg-gray-100 px-5 py-2 rounded-full">
                                <span class="text-gray-500 line-through text-lg">${PRODUCT.price.toLocaleString()} دج</span>
                                <span class="text-2xl font-bold text-green-700">${finalPrice.toLocaleString()} دج</span>
                            </div>
                            <p class="text-xs text-gray-500"><i class="fas fa-truck ml-1"></i> توصيل سريع لجميع الولايات</p>
                        </div>
                    </div>
                    
                    <!-- نموذج الطلب -->
                    <div class="space-y-4 bg-gray-50 p-5 rounded-2xl shadow-inner">
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1">الاسم <span class="text-red-500">*</span></label>
                                <input type="text" id="firstNameInput" value="${escapeHtml(state.firstName)}" class="w-full p-3 rounded-xl bg-white border-gray-200 focus:border-amber-400" placeholder="أحمد">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1">اللقب <span class="text-red-500">*</span></label>
                                <input type="text" id="lastNameInput" value="${escapeHtml(state.lastName)}" class="w-full p-3 rounded-xl bg-white" placeholder="بن علي">
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">رقم الهاتف <span class="text-red-500">*</span></label>
                            <input type="tel" id="phoneInput" value="${escapeHtml(state.phone)}" class="w-full p-3 rounded-xl bg-white" placeholder="05 XX XX XX XX" dir="ltr">
                            <p class="text-xs text-gray-400 mt-1"><i class="fas fa-info-circle ml-1"></i> مثال: 0555123456</p>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">الولاية <span class="text-red-500">*</span></label>
                            <select id="wilayaSelect" class="w-full p-3 rounded-xl bg-white">
                                <option value="">-- اختر الولاية --</option>
                                ${ALGERIA_STATES.map(w => `<option value="${escapeHtml(w)}" ${state.wilaya === w ? 'selected' : ''}>${escapeHtml(w)}</option>`).join('')}
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">طريقة الاستلام</label>
                            <div class="flex gap-3 bg-white p-2 rounded-xl border border-gray-200">
                                <label class="flex-1 flex items-center justify-center gap-2 p-2 rounded-lg cursor-pointer transition ${state.delivery === 'office' ? 'bg-amber-100 text-amber-800 border border-amber-300' : 'bg-gray-50'}">
                                    <input type="radio" name="deliveryMethod" value="office" ${state.delivery === 'office' ? 'checked' : ''} class="hidden">
                                    <i class="fas fa-building"></i>
                                    <span>استلام من مكتب</span>
                                </label>
                                <label class="flex-1 flex items-center justify-center gap-2 p-2 rounded-lg cursor-pointer transition ${state.delivery === 'home' ? 'bg-amber-100 text-amber-800 border border-amber-300' : 'bg-gray-50'}">
                                    <input type="radio" name="deliveryMethod" value="home" ${state.delivery === 'home' ? 'checked' : ''} class="hidden">
                                    <i class="fas fa-home"></i>
                                    <span>توصيل للمنزل</span>
                                </label>
                            </div>
                        </div>
                        
                        <!-- تفاصيل السعر بطريقة جذابة -->
                        <div class="bg-gradient-to-r from-gray-800 to-gray-900 text-white p-4 rounded-xl space-y-2 shadow-md">
                            <div class="flex justify-between text-sm">
                                <span>سعر المنتج (بعد الخصم):</span>
                                <span class="font-bold">${finalPrice.toLocaleString()} دج</span>
                            </div>
                            <div class="flex justify-between text-sm border-t border-gray-600 pt-1">
                                <span>رسوم التوصيل:</span>
                                <span class="font-bold">${shippingPrice.toLocaleString()} دج</span>
                            </div>
                            <div class="flex justify-between text-lg font-bold border-t-2 border-amber-500 mt-1 pt-2">
                                <span>الإجمالي:</span>
                                <span class="text-amber-400">${totalPrice.toLocaleString()} دج</span>
                            </div>
                            <div class="text-xs text-gray-300 text-center mt-2">
                                <i class="fas fa-shield-alt ml-1"></i> دفع عند الاستلام
                            </div>
                        </div>
                        
                        <button id="submitOrderBtn" class="w-full bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-700 hover:to-emerald-700 text-white p-3 rounded-xl btn-glow font-bold text-lg flex items-center justify-center gap-2 transition-all disabled:opacity-70 disabled:cursor-not-allowed" ${isDisabled ? 'disabled' : ''}>
                            ${buttonContent}
                        </button>
                        
                        ${messageHtml}
                        
                        <div class="text-center text-xs text-gray-400 pt-2">
                            <i class="fab fa-whatsapp ml-1 text-green-500"></i> الدعم الفني متاح عبر الواتساب
                        </div>
                    </div>
                </div>
            </div>
            <div class="bg-gray-100 text-center py-3 text-xs text-gray-500 border-t">
                <span>متجر VIP ™ - جميع الحقوق محفوظة | تسوق آمن مع خدمة التوصيل السريع</span>
            </div>
        </div>
    `;
    
    root.innerHTML = html;
    
    // ربط الأحداث بشكل آمن
    const firstNameEl = document.getElementById("firstNameInput");
    const lastNameEl = document.getElementById("lastNameInput");
    const phoneEl = document.getElementById("phoneInput");
    const wilayaEl = document.getElementById("wilayaSelect");
    const radioOffice = document.querySelector("input[value='office']");
    const radioHome = document.querySelector("input[value='home']");
    const submitBtn = document.getElementById("submitOrderBtn");
    
    if (firstNameEl) firstNameEl.addEventListener("input", (e) => { state.firstName = e.target.value; render(); });
    if (lastNameEl) lastNameEl.addEventListener("input", (e) => { state.lastName = e.target.value; render(); });
    if (phoneEl) phoneEl.addEventListener("input", (e) => { state.phone = e.target.value; render(); });
    if (wilayaEl) wilayaEl.addEventListener("change", (e) => { state.wilaya = e.target.value; render(); });
    
    if (radioOffice && radioHome) {
        radioOffice.addEventListener("change", (e) => { if(e.target.checked) { state.delivery = "office"; render(); } });
        radioHome.addEventListener("change", (e) => { if(e.target.checked) { state.delivery = "home"; render(); } });
    }
    
    if (submitBtn) {
        submitBtn.addEventListener("click", (e) => {
            e.preventDefault();
            if (!state.loading) submitOrder();
        });
    }
}

// دوال مساعدة لتفادي XSS
function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
        return c;
    });
}

// تحميل أي بيانات محفوظة تجريبياً (اختياري)
function init() {
    render();
    // إضافة مستمع للـ online/offline لا يوجد حاجة كبيرة
}

// بدء التطبيق
init();
</script>

<!-- ملاحظة: يجب أن يكون هناك ملف api/order.js في مسار Vercel للتعامل مع الطلبات الفعلية.
     هذا الكود جاهز للاستخدام مع endpoint الخادوم. في حالة عدم وجود الخادوم، يعمل بشكل تجريبي مع localStorage.
     لكن متجر VIP جاهز لأي تكامل مستقبلي. -->
</body>
</html>
