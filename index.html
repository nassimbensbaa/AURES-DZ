<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر VIP</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: sans-serif; }
.loading-spinner {
    width: 18px;
    height: 18px;
    border: 3px solid #ccc;
    border-top: 3px solid #000;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<body class="bg-gray-100">

<div id="root"></div>

<script>
const PRODUCT = {
    name: "ساعة ذكية VIP",
    price: 12990,
    discount: 28,
    image: "images/nassim.png",
    fallback: "https://placehold.co/600x400"
};

let state = {
    firstName: "",
    lastName: "",
    phone: "",
    wilaya: "",
    delivery: "office",
    loading: false,
    imageError: false,
    message: ""
};

const finalPrice = Math.round(PRODUCT.price * (1 - PRODUCT.discount / 100));

/* ========== SEND TO TELEGRAM (FIXED) ========== */
async function sendToTelegram(orderData) {
    try {
        const res = await fetch("/api/order", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(orderData)
        });

        const data = await res.json().catch(() => null);

        console.log("SERVER RESPONSE:", data);

        if (!res.ok) return false;
        if (data && data.ok === true) return true;

        return false;

    } catch (err) {
        console.error("ERROR:", err);
        return false;
    }
}

/* ========== SUBMIT ORDER ========== */
async function submitOrder() {

    if (!state.firstName || !state.phone) {
        state.message = "❌ أكمل البيانات";
        render();
        return;
    }

    state.loading = true;
    render();

    const order = {
        firstName: state.firstName,
        lastName: state.lastName,
        phone: state.phone,
        wilaya: state.wilaya,
        delivery: state.delivery,
        total: finalPrice,
        product: PRODUCT.name
    };

    const ok = await sendToTelegram(order);

    state.loading = false;

    if (ok) {
        state.message = "✅ تم إرسال الطلب";
        state.firstName = "";
        state.lastName = "";
        state.phone = "";
    } else {
        state.message = "❌ فشل الإرسال (تحقق من API)";
    }

    render();
}

/* ========== IMAGE HANDLER ========== */
function handleImageError() {
    state.imageError = true;
    render();
}

/* ========== RENDER ========== */
function render() {

    const img = state.imageError ? PRODUCT.fallback : PRODUCT.image;

    document.getElementById("root").innerHTML = `
    <div class="max-w-xl mx-auto bg-white p-4 mt-10 rounded-xl shadow">

        <h1 class="text-xl font-bold mb-4">${PRODUCT.name}</h1>

        <img src="${img}" onerror="handleImageError()" class="w-full rounded">

        <p class="mt-2">السعر: ${finalPrice} دج</p>

        <input id="fn" placeholder="الاسم" class="border p-2 w-full mt-2">
        <input id="ln" placeholder="اللقب" class="border p-2 w-full mt-2">
        <input id="ph" placeholder="الهاتف" class="border p-2 w-full mt-2">

        <button onclick="submitOrder()" 
            class="bg-green-600 text-white w-full p-2 mt-3 rounded">

            ${state.loading ? `<span class="loading-spinner inline-block"></span>` : "إرسال الطلب"}

        </button>

        <p class="mt-3 text-center">${state.message || ""}</p>

    </div>
    `;

    document.getElementById("fn").oninput = e => state.firstName = e.target.value;
    document.getElementById("ln").oninput = e => state.lastName = e.target.value;
    document.getElementById("ph").oninput = e => state.phone = e.target.value;
}

render();
</script>

</body>
</html>
