<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر VIP | اطلب الآن</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .title-float {
            animation: float 3s ease-in-out infinite;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .btn-glow { transition: all 0.3s ease; }
        .btn-glow:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2); }
        input, select { transition: all 0.2s ease; border: 2px solid #e5e7eb; }
        input:focus, select:focus { border-color: #f59e0b; outline: none; box-shadow: 0 0 0 3px rgba(245,158,11,0.1); }
        .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid #f3f3f3; border-top: 3px solid #f59e0b; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-100 to-gray-200">

<div id="root" class="max-w-5xl mx-auto p-4 md:p-6"></div>

<script>

const finalPrice = PRODUCT.price * (1 - PRODUCT.discount / 100);

// ========== التوكنات ==========

    "المسيلة", "وهران", "البيض", "إليزي", "برج بوعريريج", "بومرداس",
    "الطارف", "تندوف", "تيسمسيلت", "الوادي", "خنشلة", "سوق أهراس", "تيبازة"

// ========== أسعار التوصيل حسب الولاية (قابلة للتعديل) ==========
// يمكنك تعديل هذه الأسعار مباشرة لكل ولاية على حدة

// سعر التوصيل للمكتب (يختلف لكل ولاية)

    "أدرار": 850,
    "الشلف": 380,
    "الأغواط": 550,
    "أم البواقي": 480,
    "باتنة": 470,
    "بجاية": 500,
    "بسكرة": 520,
    "بشار": 750,
    "البليدة": 350,

    "الجلفة": 490,
    "جيجل": 480,
    "سطيف": 430,

    "سكيكدة": 470,
    "سيدي بلعباس": 540,
    "عنابة": 450,
    "قالمة": 460,
    "قسنطينة": 400,
    "المدية": 390,
    "ميلة": 450,
    "معسكر": 510,
    "مستغانم": 480,
    "المسيلة": 460,
    "وهران": 370,
    "البيض": 620,
    "إليزي": 950,

    "بومرداس": 360,

    "تندوف": 1100,
    "تيسمسيلت": 470,
    "الوادي": 590,
    "خنشلة": 510,
    "سوق أهراس": 500,
    "تيبازة": 380
};

// سعر التوصيل للمنزل (يختلف لكل ولاية - أسعار مختلفة تماماً عن المكتب)
const HOME_SHIPPING_RATES = {
    "أدرار": 1250,
    "الشلف": 580,
    "الأغواط": 800,
    "أم البواقي": 720,
    "باتنة": 700,
    "بجاية": 750,
    "بسكرة": 780,
    "بشار": 1050,
    "البليدة": 550,
    "البويرة": 650,
    "تمنراست": 1350,
    "تبسة": 780,
    "تلمسان": 850,
    "تيارت": 680,
    "تيزي وزو": 700,
    "الجزائر": 480,
    "الجلفة": 750,
    "جيجل": 720,
    "سطيف": 650,
    "سعيدة": 800,
    "سكيكدة": 700,
    "سيدي بلعباس": 820,
    "عنابة": 680,
    "قالمة": 700,
    "قسنطينة": 620,
    "المدية": 590,
    "ميلة": 680,
    "معسكر": 780,
    "مستغانم": 720,
    "المسيلة": 700,
    "وهران": 550,
    "البيض": 920,
    "إليزي": 1450,
    "برج بوعريريج": 620,
    "بومرداس": 540,
    "الطارف": 740,
    "تندوف": 1650,
    "تيسمسيلت": 710,
    "الوادي": 890,
    "خنشلة": 770,
    "سوق أهراس": 760,
    "تيبازة": 570
};

// القيم الافتراضية لأي ولاية غير موجودة في القوائم
const DEFAULT_OFFICE_RATE = 500;
const DEFAULT_HOME_RATE = 750;

// ========== حساب سعر التوصيل حسب الولاية ونوع التوصيل ==========
function getShippingPrice(state, deliveryType) {
    if (!state || state === "") return 0;
    
    if (deliveryType === "home") {
        // سعر توصيل المنزل حسب الولاية
        return HOME_SHIPPING_RATES[state] || DEFAULT_HOME_RATE;
    } else {
        // سعر توصيل المكتب حسب الولاية
        return OFFICE_SHIPPING_RATES[state] || DEFAULT_OFFICE_RATE;
    }
}

// ========== إرسال إلى التلغرام ==========
async function sendToTelegram(orderData) {
    const message = `🌟 *طلب جديد من المتجر* 🌟
━━━━━━━━━━━━━━━━━━━
👤 *العميل:* ${orderData.firstName} ${orderData.lastName}
📞 *الهاتف:* ${orderData.phone}
📍 *الولاية:* ${orderData.state}
🚚 *التوصيل:* ${orderData.deliveryType === 'office' ? '📦 مكتب' : '🏠 منزل'}
💰 *سعر التوصيل:* ${orderData.shipping} دج
💎 *المجموع الكلي:* ${Math.round(orderData.total)} دج
━━━━━━━━━━━━━━━━━━━
🛍️ *المنتج:* ${orderData.productName}
📅 *التاريخ:* ${new Date().toLocaleString('ar-DZ')}`;

    const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(message)}&parse_mode=Markdown`;
    
    try {
        const response = await fetch(url);
        const result = await response.json();
        return result.ok === true;
    } catch (error) {
        console.error("خطأ:", error);
        return false;
    }
}

// ========== حالة التطبيق ==========
let formData = {
    firstName: "", lastName: "", phone: "", wilaya: "", delivery: "office", loading: false, message: ""
};

// ========== عرض الواجهة ==========
function render() {
    const shipping = getShippingPrice(formData.wilaya, formData.delivery);
    const total = finalPrice + shipping;
    
    const html = `
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
            <div class="bg-gradient-to-r from-orange-600 to-purple-700 p-6 text-center text-white">
                <i class="fas fa-crown text-3xl mb-2"></i>
                <h2 class="text-xl font-bold">متجر VIP</h2>
                <p class="text-sm opacity-90">عروض حصرية | توصيل سريع</p>
            </div>
            
            <div class="grid md:grid-cols-2 gap-8 p-6 md:p-8">
                <div class="text-center md:text-right space-y-5">
                    <h1 class="text-4xl md:text-5xl font-black title-float">${PRODUCT.name}</h1>
                    <div class="relative">
                        <img src="${PRODUCT.image}" alt="product" class="w-full rounded-2xl shadow-xl" 
                             onerror="this.src='https://placehold.co/500x400/1e293b/white?text=صورة+المنتج'">
                        <div class="absolute -top-3 -right-3 bg-red-500 text-white px-4 py-2 rounded-full font-bold shadow-lg">
                            -${PRODUCT.discount}% 🔥
                        </div>
                    </div>
                    <div class="bg-gray-50 p-5 rounded-2xl">
                        <span class="text-4xl font-bold text-gray-800">${Math.round(finalPrice)}</span>
                        <span class="text-xl"> دج</span>
                        <span class="line-through text-gray-400 mx-3">${PRODUCT.price} دج</span>
                    </div>
                    <button onclick="document.getElementById('orderForm').scrollIntoView({behavior:'smooth'})" 
                            class="w-full bg-gradient-to-r from-orange-500 to-red-500 text-white py-3 rounded-xl font-bold text-lg btn-glow">
                        <i class="fas fa-cart-shopping ml-2"></i> اطلب الآن
                    </button>
                </div>
                
                <div id="orderForm">
                    <div class="bg-white rounded-2xl p-6 shadow-lg border border-gray-100">
                        <h3 class="text-2xl font-bold mb-5 border-r-4 border-orange-500 pr-3">
                            <i class="fas fa-file-alt text-orange-500 ml-2"></i> بيانات الطلب
                        </h3>
                        
                        <div class="space-y-4">
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-gray-700 text-sm font-bold mb-1">الاسم *</label>
                                    <input type="text" id="firstName" value="${formData.firstName}" 
                                           placeholder="أحمد" class="w-full p-3 rounded-xl bg-gray-50">
                                </div>
                                <div>
                                    <label class="block text-gray-700 text-sm font-bold mb-1">اللقب *</label>
                                    <input type="text" id="lastName" value="${formData.lastName}" 
                                           placeholder="بن عمار" class="w-full p-3 rounded-xl bg-gray-50">
                                </div>
                            </div>
                            
                            <div>
                                <label class="block text-gray-700 text-sm font-bold mb-1">رقم الهاتف *</label>
                                <input type="tel" id="phone" value="${formData.phone}" 
                                       placeholder="05XX XX XX XX" class="w-full p-3 rounded-xl bg-gray-50">
                            </div>
                            
                            <div>
                                <label class="block text-gray-700 text-sm font-bold mb-1">الولاية *</label>
                                <select id="wilaya" class="w-full p-3 rounded-xl bg-gray-50">
                                    <option value="">-- اختر الولاية --</option>
                                    ${ALGERIA_STATES.map(w => `<option value="${w}" ${formData.wilaya === w ? 'selected' : ''}>${w}</option>`).join('')}
                                </select>
                            </div>
                            
                            ${formData.wilaya ? `
                                <div class="bg-orange-50 p-4 rounded-xl">
                                    <p class="font-bold mb-2">طريقة التوصيل:</p>
                                    <div class="flex gap-4">
                                        <label class="flex items-center gap-2 cursor-pointer">
                                            <input type="radio" name="delivery" value="office" ${formData.delivery === 'office' ? 'checked' : ''}>
                                            <span>📦 توصيل للمكتب</span>
                                        </label>
                                        <label class="flex items-center gap-2 cursor-pointer">
                                            <input type="radio" name="delivery" value="home" ${formData.delivery === 'home' ? 'checked' : ''}>
                                            <span>🏠 توصيل للمنزل</span>
                                        </label>
                                    </div>
                                </div>
                                
                                <div class="bg-gray-800 text-white p-5 rounded-xl">
                                    <div class="flex justify-between mb-2">
                                        <span>💰 سعر المنتج:</span>
                                        <span>${Math.round(finalPrice)} دج</span>
                                    </div>
                                    <div class="flex justify-between mb-2">
                                        <span>🚚 سعر التوصيل (${formData.delivery === 'home' ? 'منزل' : 'مكتب'}):</span>
                                        <span class="text-orange-400">${shipping} دج</span>
                                    </div>
                                    <div class="flex justify-between pt-3 border-t border-gray-600 text-lg font-bold">
                                        <span>💎 المجموع الكلي:</span>
                                        <span class="text-yellow-400">${Math.round(total)} دج</span>
                                    </div>
                                </div>
                            ` : ''}
                            
                            <button id="submitBtn" class="w-full bg-gradient-to-r from-green-600 to-emerald-700 text-white py-3 rounded-xl font-bold text-lg btn-glow">
                                ${formData.loading ? '<span class="loading"></span> جاري الإرسال...' : '<i class="fab fa-telegram ml-2"></i> تأكيد الطلب'}
                            </button>
                            
                            ${formData.message ? `
                                <div class="text-center p-3 rounded-xl ${formData.message.includes('✅') ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                                    ${formData.message}
                                </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="bg-gray-100 p-4 text-center text-sm text-gray-600">
                <i class="fas fa-lock ml-1"></i> دفع آمن عند الاستلام
            </div>
        </div>
    `;
    
    document.getElementById('root').innerHTML = html;
    
    document.getElementById('firstName')?.addEventListener('input', (e) => { formData.firstName = e.target.value; });
    document.getElementById('lastName')?.addEventListener('input', (e) => { formData.lastName = e.target.value; });
    document.getElementById('phone')?.addEventListener('input', (e) => { formData.phone = e.target.value; });
    document.getElementById('wilaya')?.addEventListener('change', (e) => { formData.wilaya = e.target.value; render(); });
    document.querySelectorAll('input[name="delivery"]')?.forEach(radio => {
        radio?.addEventListener('change', (e) => { if (e.target.checked) { formData.delivery = e.target.value; render(); } });
    });
    document.getElementById('submitBtn')?.addEventListener('click', submitOrder);
}

// ========== تأكيد الطلب ==========
async function submitOrder() {
    if (!formData.firstName.trim()) { formData.message = "❌ الرجاء إدخال الاسم"; render(); return; }
    if (!formData.lastName.trim()) { formData.message = "❌ الرجاء إدخال اللقب"; render(); return; }
    if (!formData.phone.trim()) { formData.message = "❌ الرجاء إدخال رقم الهاتف"; render(); return; }
    if (!formData.wilaya) { formData.message = "❌ الرجاء اختيار الولاية"; render(); return; }
    
    formData.loading = true;
    formData.message = "";
    render();
    
    const shipping = getShippingPrice(formData.wilaya, formData.delivery);
    const total = finalPrice + shipping;
    
    const sent = await sendToTelegram({
        firstName: formData.firstName,
        lastName: formData.lastName,
        phone: formData.phone,
        state: formData.wilaya,
        deliveryType: formData.delivery,
        shipping: shipping,
        total: total,
        productName: PRODUCT.name
    });
    
    if (sent) {
        formData.message = `✅ تم استلام طلبك بنجاح! المجموع: ${Math.round(total)} دج`;
        formData.firstName = ""; formData.lastName = ""; formData.phone = ""; formData.wilaya = ""; formData.delivery = "office";
    } else {
        formData.message = "❌ حدث خطأ، حاول مرة أخرى";
    }
    
    formData.loading = false;
    render();
    setTimeout(() => { formData.message = ""; render(); }, 5000);
}

render();
</script>
</body>
</html>
