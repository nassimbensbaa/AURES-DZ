        }

            animation: spin 0.7s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

            from {

// ========== حساب سعر التوصيل ==========
function getShippingPrice(stateName, deliveryType) {
    if (!stateName) return 0;
    const state = ALGERIA_STATES_WITH_PRICES.find(s => s.name === stateName);
    if (!state) return deliveryType === "home" ? 600 : 400;
    return deliveryType === "home" ? state.homePrice : state.officePrice;
}

// ========== إرسال الطلب إلى تيليغرام ==========
async function sendToTelegram(orderData) {
    // التحقق من إعدادات البوت
    if (TELEGRAM_CONFIG.botToken === "YOUR_BOT_TOKEN_HERE" || TELEGRAM_CONFIG.chatId === "YOUR_CHAT_ID_HERE") {
        console.warn("⚠️ لم يتم إعداد بوت تيليغرام بشكل صحيح. يرجى إضافة التوكن ومعرف الشات.");
        
        // عرض تنبيه للمستخدم في وضع التجربة
        const mockOrders = JSON.parse(localStorage.getItem("demo_orders") || "[]");
        mockOrders.push({ ...orderData, timestamp: new Date().toISOString(), demoMode: true });
        localStorage.setItem("demo_orders", JSON.stringify(mockOrders));
        
        // إظهار رسالة للمستخدم
        alert("⚠️ تنبيه تجريبي: لم يتم إعداد بوت تيليغرام بعد.\n\nللإعداد الفعلي:\n1. احصل على توكن البوت من @BotFather\n2. احصل على معرف الشات من @userinfobot\n3. قم بتعديل المتغيرات TELEGRAM_CONFIG في الكود\n\nحالياً يتم حفظ الطلبات محلياً للتجربة.");
        
        return false;
    }
    
    try {
        // تنسيق الرسالة بشكل جميل
        const message = `🛍️ *طلب جديد من متجر VIP*\n\n` +
                       `👤 *العميل:* ${orderData.firstName} ${orderData.lastName}\n` +
                       `📞 *الهاتف:* ${orderData.phone}\n` +
                       `📍 *الولاية:* ${orderData.state}\n` +
                       `🚚 *نوع التوصيل:* ${orderData.deliveryType === 'office' ? 'استلام من مكتب' : 'توصيل للمنزل'}\n` +
                       `💰 *سعر المنتج:* ${orderData.finalPrice.toLocaleString()} دج\n` +
                       `🚛 *رسوم التوصيل:* ${orderData.shipping.toLocaleString()} دج\n` +
                       `💎 *الإجمالي:* ${orderData.total.toLocaleString()} دج\n` +
                       `🕐 *تاريخ الطلب:* ${new Date(orderData.orderDate).toLocaleString('ar-DZ')}\n\n` +
                       `✨ *المنتج:* ${orderData.productName}\n\n` +
                       `✅ *حالة الطلب:* قيد المراجعة`;
        
        // إرسال إلى API تيليغرام
        const url = `https://api.telegram.org/bot${TELEGRAM_CONFIG.botToken}/sendMessage`;
        const response = await fetch(url, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                chat_id: TELEGRAM_CONFIG.chatId,
                text: message,
                parse_mode: "Markdown",
                disable_web_page_preview: true
            })
        });
        
        const result = await response.json();
        
        if (result.ok) {
            console.log("✅ تم إرسال الطلب إلى تيليغرام بنجاح");
            return true;
        } else {
            console.error("❌ فشل إرسال الطلب إلى تيليغرام:", result.description);
            return false;
        }
    } catch (err) {
        console.error("❌ خطأ في الاتصال:", err);
        return false;
    }
}

// ========== الحالة الرئيسية ==========
let state = {

    phone: "",
    wilaya: "",
    delivery: "office",
    loading: false,
    message: { text: "", type: "" },
    imageError: false
};

// ========== دوال مساعدة ==========
function updateMessage(msg, type = "error") {
    state.message = { text: msg, type: type };
    render();
    if (type === "success") {
        setTimeout(() => {
            if (state.message.text === msg) {
                state.message = { text: "", type: "" };
                render();
            }
        }, 5000);
    }
}

function validatePhone(phone) {
    const cleaned = phone.replace(/\s/g, '');
    const algerianRegex = /^(05|06|07)\d{8}$/;
    if (algerianRegex.test(cleaned)) return true;
    if (/^\d{9,12}$/.test(cleaned)) return true;
    return false;
}

// ========== إرسال الطلب ==========
async function submitOrder() {
    if (!state.firstName.trim()) {
        updateMessage("⚠️ الرجاء إدخال الاسم", "error");
        document.getElementById("firstNameInput")?.focus();
        return;
    }
    if (!state.lastName.trim()) {
        updateMessage("⚠️ الرجاء إدخال اللقب", "error");
        document.getElementById("lastNameInput")?.focus();
        return;
    }
    if (!state.phone.trim()) {
        updateMessage("📱 الرجاء إدخال رقم الهاتف", "error");
        document.getElementById("phoneInput")?.focus();
        return;
    }
    if (!validatePhone(state.phone.trim())) {
        updateMessage("📞 رقم هاتف غير صالح (مثال: 0555123456)", "error");
        document.getElementById("phoneInput")?.focus();
        return;
    }
    if (!state.wilaya) {
        updateMessage("📍 الرجاء اختيار الولاية", "error");
        document.getElementById("wilayaSelect")?.focus();
        return;
    }

    state.loading = true;
    render();

    const shippingPrice = getShippingPrice(state.wilaya, state.delivery);
    const totalAmount = finalPrice + shippingPrice;

    const orderPayload = {
        firstName: state.firstName.trim(),
        lastName: state.lastName.trim(),
        phone: state.phone.trim(),
        state: state.wilaya,
        deliveryType: state.delivery,
        shipping: shippingPrice,
        total: totalAmount,
        productName: PRODUCT.name,
        finalPrice: finalPrice,
        orderDate: new Date().toISOString()
    };

    const success = await sendToTelegram(orderPayload);
    
    state.loading = false;

    if (success) {
        // حفظ الطلب في localStorage كنسخة احتياطية
        const orders = JSON.parse(localStorage.getItem("sent_orders") || "[]");
        orders.push({ ...orderPayload, sentAt: new Date().toISOString() });
        localStorage.setItem("sent_orders", JSON.stringify(orders));
        
        // مسح الحقول
        state.firstName = "";
        state.lastName = "";
        state.phone = "";
        state.wilaya = "";
        state.delivery = "office";
        updateMessage("✅ تم إرسال طلبك بنجاح! سيتصل بك فريق الدعم خلال 24 ساعة.", "success");
    } else {
        updateMessage("❌ حدث خطأ أثناء إرسال الطلب. يرجى المحاولة مرة أخرى أو الاتصال بالدعم.", "error");
    }
    render();
}

                            <div class="flex gap-3 bg-white p-2 rounded-xl border-2 border-gray-200">
                                <label class="flex-1 flex items-center justify-center gap-2 p-2 rounded-lg cursor-pointer transition ${state.delivery === 'office' ? 'bg-amber-100 text-amber-800 border-2 border-amber-300' : 'bg-gray-50 border border-gray-200'}">
                                    <input type="radio" name="deliveryMethod" value="office" ${state.delivery === 'office' ? 'checked' : ''} class="hidden">
                                    <i class="fas fa-building"></i>
                                    <span>استلام من مكتب</span>
                                </label>
                                <label class="flex-1 flex items-center justify-center gap-2 p-2 rounded-lg cursor-pointer transition ${state.delivery === 'home' ? 'bg-amber-100 text-amber-800 border-2 border-amber-300' : 'bg-gray-50 border border-gray-200'}">
                                    <input type="radio" name="deliveryMethod" value="home" ${state.delivery === 'home' ? 'checked' : ''} class="hidden">
                                    <i class="fas fa-home"></i>
                                    <span>توصيل للمنزل</span>
                                </label>
                            </div>
                        </div>
                        
                        <!-- تفاصيل السعر -->
                        <div class="bg-gradient-to-r from-gray-800 to-gray-900 text-white p-4 rounded-xl space-y-2 shadow-md">
                            <div class="flex justify-between text-sm">
                                <span>💰 سعر المنتج (بعد الخصم):</span>
                                <span class="font-bold">${finalPrice.toLocaleString()} دج</span>
                            </div>
                            <div class="flex justify-between text-sm border-t border-gray-600 pt-1">
                                <span>🚚 رسوم التوصيل (${state.delivery === 'office' ? 'مكتب' : 'منزل'}):</span>
                                <span class="font-bold">${shippingPrice.toLocaleString()} دج</span>
                            </div>
                            <div class="flex justify-between text-lg font-bold border-t-2 border-amber-500 mt-1 pt-2">
                                <span>💎 الإجمالي:</span>
                                <span class="text-amber-400 text-xl">${totalPrice.toLocaleString()} دج</span>
                            </div>
                            <div class="text-xs text-gray-300 text-center mt-2">
                                <i class="fas fa-hand-holding-usd ml-1"></i> دفع عند الاستلام - آمن ومضمون
                            </div>
                        </div>
                        
                        <button id="submitOrderBtn" 
                                class="w-full bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-700 hover:to-emerald-700 text-white p-3 rounded-xl btn-glow font-bold text-lg flex items-center justify-center gap-2 transition-all disabled:opacity-70" 
                                ${isDisabled ? 'disabled' : ''}>
                            ${buttonContent}
                        </button>
                        
                        ${messageHtml}
                        
                        <div class="text-center text-xs text-gray-400 pt-2 border-t border-gray-200">
                            <i class="fab fa-telegram ml-1 text-blue-500"></i> سيتم إرسال طلبك مباشرة عبر تيليغرام
                            <span class="mx-2">•</span>
                            <i class="fas fa-lock ml-1"></i> معلوماتك آمنة
                        </div>
                    </div>
                </div>
            </div>
            <div class="bg-gray-100 text-center py-3 text-xs text-gray-500 border-t">
                <span>متجر VIP ™ - خدمة التوصيل إلى جميع ولايات الجزائر الـ 58</span>
            </div>
        </div>
    `;
    
    root.innerHTML = html;
    
    // ربط الأحداث
    document.getElementById("firstNameInput")?.addEventListener("input", (e) => { state.firstName = e.target.value; });
    document.getElementById("lastNameInput")?.addEventListener("input", (e) => { state.lastName = e.target.value; });
    document.getElementById("phoneInput")?.addEventListener("input", (e) => { state.phone = e.target.value; });
    document.getElementById("wilayaSelect")?.addEventListener("change", (e) => { state.wilaya = e.target.value; render(); });
    
    const radioOffice = document.querySelector("input[value='office']");
    const radioHome = document.querySelector("input[value='home']");
    if (radioOffice) radioOffice.addEventListener("change", (e) => { if(e.target.checked) { state.delivery = "office"; render(); } });
    if (radioHome) radioHome.addEventListener("change", (e) => { if(e.target.checked) { state.delivery = "home"; render(); } });
    
    document.getElementById("submitOrderBtn")?.addEventListener("click", (e) => {
        e.preventDefault();
        if (!state.loading) submitOrder();
    });
}

function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

window.handleImageError = handleImageError;
