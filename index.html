<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر VIP | ساعة برو MAX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .title-float {
            animation: float 3s ease-in-out infinite;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .btn-glow { transition: all 0.3s ease; }
        .btn-glow:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2); }
        input, select { transition: all 0.2s ease; border: 2px solid #e5e7eb; }
        input:focus, select:focus { border-color: #f59e0b; outline: none; box-shadow: 0 0 0 3px rgba(245,158,11,0.1); }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #ffffff80;
            border-top: 3px solid #ffffff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .success-toast {
            animation: fadeSlide 0.4s ease-out;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-100 to-gray-200">

<div id="root" class="max-w-5xl mx-auto p-4 md:p-6"></div>

<script>
// ========== بيانات المنتج ==========
const PRODUCT = {
    name: "🔥 ساعة ذكية برو MAX",
    price: 12990,
    discount: 28,
    image: "images/nassim.png"
};

const finalPrice = Math.round(PRODUCT.price * (1 - PRODUCT.discount / 100));

// ========== جميع ولايات الجزائر (58 ولاية) مع أسعار التوصيل ==========
const ALGERIA_STATES = [
    { name: "أدرار", officePrice: 500, homePrice: 800 },
    { name: "الشلف", officePrice: 400, homePrice: 650 },
    { name: "الأغواط", officePrice: 480, homePrice: 750 },
    { name: "أم البواقي", officePrice: 450, homePrice: 700 },
    { name: "باتنة", officePrice: 420, homePrice: 680 },
    { name: "بجاية", officePrice: 380, homePrice: 620 },
    { name: "بسكرة", officePrice: 460, homePrice: 720 },
    { name: "بشار", officePrice: 550, homePrice: 850 },
    { name: "البليدة", officePrice: 350, homePrice: 580 },
    { name: "البويرة", officePrice: 370, homePrice: 600 },
    { name: "تمنراست", officePrice: 600, homePrice: 900 },
    { name: "تبسة", officePrice: 480, homePrice: 740 },
    { name: "تلمسان", officePrice: 440, homePrice: 690 },
    { name: "تيارت", officePrice: 420, homePrice: 670 },
    { name: "تيزي وزو", officePrice: 390, homePrice: 630 },
    { name: "الجزائر", officePrice: 300, homePrice: 500 },
    { name: "جلفة", officePrice: 450, homePrice: 710 },
    { name: "جيجل", officePrice: 400, homePrice: 650 },
    { name: "سطيف", officePrice: 380, homePrice: 620 },
    { name: "سعيدة", officePrice: 430, homePrice: 680 },
    { name: "سكيكدة", officePrice: 410, homePrice: 660 },
    { name: "سيدي بلعباس", officePrice: 420, homePrice: 670 },
    { name: "عنابة", officePrice: 380, homePrice: 620 },
    { name: "قالمة", officePrice: 420, homePrice: 670 },
    { name: "قسنطينة", officePrice: 370, homePrice: 600 },
    { name: "المدية", officePrice: 370, homePrice: 600 },
    { name: "مستغانم", officePrice: 400, homePrice: 650 },
    { name: "المسيلة", officePrice: 420, homePrice: 670 },
    { name: "معسكر", officePrice: 410, homePrice: 660 },
    { name: "ورقلة", officePrice: 520, homePrice: 800 },
    { name: "وهران", officePrice: 360, homePrice: 590 },
    { name: "البيض", officePrice: 500, homePrice: 780 },
    { name: "إليزي", officePrice: 650, homePrice: 950 },
    { name: "برج بوعريريج", officePrice: 390, homePrice: 630 },
    { name: "بومرداس", officePrice: 360, homePrice: 590 },
    { name: "الطارف", officePrice: 430, homePrice: 680 },
    { name: "تندوف", officePrice: 620, homePrice: 920 },
    { name: "تيسمسيلت", officePrice: 440, homePrice: 690 },
    { name: "الوادي", officePrice: 500, homePrice: 770 },
    { name: "خنشلة", officePrice: 460, homePrice: 720 },
    { name: "سوق أهراس", officePrice: 440, homePrice: 690 },
    { name: "تيبازة", officePrice: 360, homePrice: 590 },
    { name: "ميلة", officePrice: 420, homePrice: 670 },
    { name: "عين الدفلى", officePrice: 380, homePrice: 620 },
    { name: "النعامة", officePrice: 480, homePrice: 740 },
    { name: "عين تموشنت", officePrice: 420, homePrice: 670 },
    { name: "غرداية", officePrice: 500, homePrice: 780 },
    { name: "غليزان", officePrice: 420, homePrice: 670 },
    { name: "تيميمون", officePrice: 580, homePrice: 880 },
    { name: "برج باجي مختار", officePrice: 620, homePrice: 950 },
    { name: "أولاد جلال", officePrice: 520, homePrice: 800 },
    { name: "بني عباس", officePrice: 580, homePrice: 880 },
    { name: "عين صالح", officePrice: 600, homePrice: 920 },
    { name: "عين قزام", officePrice: 650, homePrice: 980 },
    { name: "تقرت", officePrice: 510, homePrice: 790 },
    { name: "جانت", officePrice: 680, homePrice: 1000 },
    { name: "المغير", officePrice: 520, homePrice: 800 },
    { name: "المنيعة", officePrice: 540, homePrice: 830 }
];

// ========== حساب التوصيل ==========
function getShippingPrice(stateName, deliveryType) {
    if (!stateName) return 0;
    const state = ALGERIA_STATES.find(s => s.name === stateName);
    if (!state) return deliveryType === "home" ? 600 : 400;
    return deliveryType === "home" ? state.homePrice : state.officePrice;
}

// ========== إرسال إلى API الآمن ==========
async function sendToTelegram(orderData) {
    try {
        const response = await fetch("/api/send-order", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(orderData)
        });
        const result = await response.json();
        return result.ok === true;
    } catch (err) {
        console.error(err);
        return false;
    }
}

// ========== الحالة ==========
let formData = {
    firstName: "",
    lastName: "",
    phone: "",
    wilaya: "",
    delivery: "office",
    loading: false,
    message: "",
    messageType: "error"
};

// ========== الواجهة ==========
function render() {
    const shipping = getShippingPrice(formData.wilaya, formData.delivery);
    const total = finalPrice + shipping;

    let selectedState = null;
    if (formData.wilaya) {
        selectedState = ALGERIA_STATES.find(s => s.name === formData.wilaya);
    }

    const messageHtml = formData.message ? 
        `<div class="mt-3 p-3 rounded-xl text-center font-medium transition-all success-toast shadow-md 
            ${formData.messageType === 'success' ? 'bg-emerald-100 text-emerald-800 border-r-4 border-emerald-500' : 'bg-red-100 text-red-800 border-r-4 border-red-500'}">
            <i class="fas ${formData.messageType === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'} ml-2"></i>
            ${formData.message}
        </div>` : '';

    const buttonContent = formData.loading ? 
        `<span class="inline-flex items-center justify-center"><span>جاري الإرسال</span><span class="loading-spinner"></span></span>` 
        : '<span><i class="fas fa-paper-plane ml-2"></i> تأكيد الطلب</span>';

    document.getElementById("root").innerHTML = `
        <div class="bg-white rounded-3xl shadow-2xl p-6">
            <div class="relative bg-gradient-to-r from-amber-600 to-orange-600 -mt-6 -mx-6 mb-6 px-6 py-3 rounded-t-3xl text-center">
                <span class="text-white text-sm font-bold tracking-wide">
                    <i class="fab fa-telegram ml-1"></i> الطلبات ترسل مباشرة إلى تيليغرام
                </span>
            </div>

            <h1 class="text-3xl font-bold text-center title-float mb-6">
                <i class="fas fa-crown text-amber-500 ml-2"></i>
                ${PRODUCT.name}
            </h1>

            <div class="grid md:grid-cols-2 gap-6">

                <div>
                    <img src="${PRODUCT.image}" class="rounded-2xl shadow w-full" onerror="this.src='https://placehold.co/600x500/1e293b/f59e0b?text=⌚+ساعة+VIP'">
                    <div class="mt-3 text-center">
                        <span class="text-gray-500 line-through text-lg ml-2">${PRODUCT.price.toLocaleString()} دج</span>
                        <span class="text-2xl font-bold text-green-700">${finalPrice.toLocaleString()} دج</span>
                        <span class="bg-red-500 text-white px-2 py-1 rounded-full text-xs mr-2">خصم ${PRODUCT.discount}%</span>
                    </div>
                </div>

                <div class="space-y-3">
                    <input id="firstName" placeholder="الاسم" value="${formData.firstName}" class="w-full p-3 rounded-xl bg-gray-50 border-2 focus:border-amber-400">
                    <input id="lastName" placeholder="اللقب" value="${formData.lastName}" class="w-full p-3 rounded-xl bg-gray-50 border-2 focus:border-amber-400">
                    <input id="phone" placeholder="رقم الهاتف" value="${formData.phone}" class="w-full p-3 rounded-xl bg-gray-50 border-2 focus:border-amber-400" dir="ltr">

                    <select id="wilaya" class="w-full p-3 rounded-xl bg-gray-50 border-2 focus:border-amber-400">
                        <option value="">-- اختر الولاية --</option>
                        ${ALGERIA_STATES.map(s => `<option value="${s.name}" ${formData.wilaya === s.name ? 'selected' : ''}>${s.name}</option>`).join("")}
                    </select>
                    
                    ${selectedState ? `
                        <div class="text-xs text-green-600 bg-green-50 p-2 rounded-lg">
                            <i class="fas fa-info-circle ml-1"></i>
                            التوصيل للمكتب: ${selectedState.officePrice} دج | التوصيل للمنزل: ${selectedState.homePrice} دج
                        </div>
                    ` : ''}

                    <select id="delivery" class="w-full p-3 rounded-xl bg-gray-50 border-2 focus:border-amber-400">
                        <option value="office" ${formData.delivery === 'office' ? 'selected' : ''}>📦 استلام من مكتب (التوصيل: ${shipping} دج)</option>
                        <option value="home" ${formData.delivery === 'home' ? 'selected' : ''}>🏠 توصيل للمنزل (التوصيل: ${shipping} دج)</option>
                    </select>

                    <div class="bg-gradient-to-r from-gray-800 to-gray-900 text-white p-4 rounded-xl">
                        <div class="flex justify-between items-center">
                            <span>💰 سعر المنتج:</span>
                            <span>${finalPrice.toLocaleString()} دج</span>
                        </div>
                        <div class="flex justify-between items-center mt-2">
                            <span>🚚 رسوم التوصيل:</span>
                            <span>${shipping.toLocaleString()} دج</span>
                        </div>
                        <div class="border-t border-gray-600 my-2"></div>
                        <div class="flex justify-between items-center text-lg font-bold">
                            <span>💎 المجموع النهائي:</span>
                            <span class="text-amber-400">${Math.round(total).toLocaleString()} دج</span>
                        </div>
                    </div>

                    <button id="btn" class="w-full bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-700 hover:to-emerald-700 text-white p-3 rounded-xl btn-glow font-bold text-lg flex items-center justify-center gap-2 transition-all" ${formData.loading ? 'disabled' : ''}>
                        ${buttonContent}
                    </button>

                    ${messageHtml}
                </div>
            </div>
        </div>
    `;

    document.getElementById("firstName").oninput = e => formData.firstName = e.target.value;
    document.getElementById("lastName").oninput = e => formData.lastName = e.target.value;
    document.getElementById("phone").oninput = e => formData.phone = e.target.value;
    document.getElementById("wilaya").onchange = e => { formData.wilaya = e.target.value; render(); };
    document.getElementById("delivery").onchange = e => { formData.delivery = e.target.value; render(); };
    document.getElementById("btn").onclick = submit;
}

// ========== إرسال الطلب ==========
async function submit() {
    if (!formData.firstName.trim()) {
        formData.message = "⚠️ الرجاء إدخال الاسم";
        formData.messageType = "error";
        render();
        return;
    }
    if (!formData.phone.trim()) {
        formData.message = "⚠️ الرجاء إدخال رقم الهاتف";
        formData.messageType = "error";
        render();
        return;
    }
    if (!formData.wilaya) {
        formData.message = "⚠️ الرجاء اختيار الولاية";
        formData.messageType = "error";
        render();
        return;
    }

    formData.loading = true;
    render();

    const shipping = getShippingPrice(formData.wilaya, formData.delivery);
    const total = finalPrice + shipping;

    const ok = await sendToTelegram({
        firstName: formData.firstName,
        lastName: formData.lastName || "",
        phone: formData.phone,
        state: formData.wilaya,
        deliveryType: formData.delivery,
        shipping: shipping,
        total: total,
        finalPrice: finalPrice,
        productName: PRODUCT.name
    });

    formData.loading = false;

    if (ok) {
        formData.message = "✅ تم إرسال طلبك بنجاح! سيتصل بك الدعم قريباً";
        formData.messageType = "success";
        formData.firstName = "";
        formData.lastName = "";
        formData.phone = "";
        formData.wilaya = "";
        formData.delivery = "office";
    } else {
        formData.message = "❌ فشل الإرسال. يرجى المحاولة مرة أخرى";
        formData.messageType = "error";
    }

    render();
}

render();
</script>

</body>
</html>
