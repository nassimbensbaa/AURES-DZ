            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .title-float {
            animation: float 3s ease-in-out infinite;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

            transition: all 0.3s ease;
        }
        .btn-glow:hover {

        input, select {
            transition: all 0.2s ease;
            border: 2px solid #e5e7eb;
        }
        input:focus, select:focus {
            border-color: #f59e0b;
            outline: none;
            box-shadow: 0 0 0 3px rgba(245,158,11,0.1);
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #ffffff80;
            border-top: 3px solid #ffffff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    { name: "معسكر", officePrice: 410, homePrice: 660 },

    { name: "وهران", officePrice: 360, homePrice: 590 },

    { name: "المنيعة", officePrice: 540, homePrice: 830 }

// ========== حساب سعر التوصيل ==========
function getShippingPrice(stateName, deliveryType) {
    if (!stateName) return 0;
    const state = ALGERIA_STATES.find(s => s.name === stateName);
    if (!state) return deliveryType === "home" ? 600 : 400;
    return deliveryType === "home" ? state.homePrice : state.officePrice;
}

// ========== إرسال إلى التلغرام (نفس الطريقة التي تعمل) ==========
async function sendToTelegram(orderData) {
    const message = `🌟 طلب جديد من متجر VIP 🌟
━━━━━━━━━━━━━━━━━━━━━━━━
👤 العميل: ${orderData.firstName} ${orderData.lastName}
📞 الهاتف: ${orderData.phone}
📍 الولاية: ${orderData.state}
🚚 التوصيل: ${orderData.deliveryType === 'office' ? '📦 استلام من مكتب' : '🏠 توصيل للمنزل'}
💰 سعر المنتج: ${orderData.finalPrice} دج
🚛 رسوم التوصيل: ${orderData.shipping} دج
💎 المجموع الكلي: ${Math.round(orderData.total)} دج
━━━━━━━━━━━━━━━━━━━━━━━━
🛍️ المنتج: ${orderData.productName}
📅 التاريخ: ${new Date().toLocaleString('ar-DZ')}
━━━━━━━━━━━━━━━━━━━━━━━━
✅ تم استلام الطلب بنجاح`;

    const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(message)}`;
    
    try {
        const response = await fetch(url);
        const result = await response.json();
        console.log("رد التلغرام:", result);
        return result.ok === true;
    } catch (error) {
        console.error("خطأ:", error);
        return false;
    }
}

// ========== حالة التطبيق ==========
let formData = {
    firstName: "", 
    lastName: "", 
    phone: "", 
    wilaya: "", 
    delivery: "office", 
    loading: false, 
    message: ""
};

// ========== عرض الواجهة ==========
function render() {
    const shipping = getShippingPrice(formData.wilaya, formData.delivery);
    const total = finalPrice + shipping;
    
    const selectedState = formData.wilaya ? ALGERIA_STATES.find(s => s.name === formData.wilaya) : null;
    
    const html = `
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
            <div class="bg-gradient-to-r from-orange-600 to-purple-700 p-6 text-center text-white">
                <i class="fas fa-crown text-3xl mb-2"></i>
                <h2 class="text-xl font-bold">متجر VIP</h2>
                <p class="text-sm opacity-90">عروض حصرية | توصيل سريع لجميع الولايات</p>
            </div>
            
            <div class="grid md:grid-cols-2 gap-8 p-6 md:p-8">
                <div class="text-center md:text-right space-y-5">
                    <h1 class="text-4xl md:text-5xl font-black title-float">${PRODUCT.name}</h1>
                    <div class="relative">
                        <img src="${PRODUCT.image}" alt="product" class="w-full rounded-2xl shadow-xl" 
                             onerror="this.src='https://placehold.co/500x400/1e293b/f59e0b?text=⌚+ساعة+VIP'">
                        <div class="absolute -top-3 -right-3 bg-red-500 text-white px-4 py-2 rounded-full font-bold shadow-lg">
                            -${PRODUCT.discount}% 🔥
                        </div>
                    </div>
                    <div class="bg-gray-50 p-5 rounded-2xl">
                        <span class="text-4xl font-bold text-gray-800">${finalPrice.toLocaleString()}</span>
                        <span class="text-xl"> دج</span>
                        <span class="line-through text-gray-400 mx-3">${PRODUCT.price.toLocaleString()} دج</span>
                    </div>
                </div>
                
                <div>
                    <div class="bg-white rounded-2xl p-6 shadow-lg border border-gray-100">
                        <h3 class="text-2xl font-bold mb-5 border-r-4 border-orange-500 pr-3">
                            <i class="fas fa-file-alt text-orange-500 ml-2"></i> بيانات الطلب
                        </h3>
                        
                        <div class="space-y-4">
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-gray-700 text-sm font-bold mb-1">الاسم *</label>
                                    <input type="text" id="firstName" value="${formData.firstName}" 
                                           placeholder="أحمد" class="w-full p-3 rounded-xl bg-gray-50">
                                </div>
                                <div>
                                    <label class="block text-gray-700 text-sm font-bold mb-1">اللقب *</label>
                                    <input type="text" id="lastName" value="${formData.lastName}" 
                                           placeholder="بن عمار" class="w-full p-3 rounded-xl bg-gray-50">
                                </div>
                            </div>
                            
                            <div>
                                <label class="block text-gray-700 text-sm font-bold mb-1">رقم الهاتف *</label>
                                <input type="tel" id="phone" value="${formData.phone}" 
                                       placeholder="05XX XX XX XX" class="w-full p-3 rounded-xl bg-gray-50" dir="ltr">
                            </div>
                            
                            <div>
                                <label class="block text-gray-700 text-sm font-bold mb-1">الولاية *</label>
                                <select id="wilaya" class="w-full p-3 rounded-xl bg-gray-50">
                                    <option value="">-- اختر الولاية --</option>
                                    ${ALGERIA_STATES.map(s => `<option value="${s.name}" ${formData.wilaya === s.name ? 'selected' : ''}>${s.name}</option>`).join('')}
                                </select>
                            </div>
                            
                            ${formData.wilaya && selectedState ? `
                                <div class="bg-orange-50 p-4 rounded-xl">
                                    <p class="font-bold mb-2">طريقة التوصيل:</p>
                                    <div class="flex gap-4">
                                        <label class="flex items-center gap-2 cursor-pointer">
                                            <input type="radio" name="delivery" value="office" ${formData.delivery === 'office' ? 'checked' : ''}>
                                            <span>📦 استلام من مكتب</span>
                                            <span class="text-green-600 text-sm">(${selectedState.officePrice} دج)</span>
                                        </label>
                                        <label class="flex items-center gap-2 cursor-pointer">
                                            <input type="radio" name="delivery" value="home" ${formData.delivery === 'home' ? 'checked' : ''}>
                                            <span>🏠 توصيل للمنزل</span>
                                            <span class="text-orange-500 text-sm">(${selectedState.homePrice} دج)</span>
                                        </label>
                                    </div>
                                </div>
                                
                                <div class="bg-gray-800 text-white p-5 rounded-xl">
                                    <div class="flex justify-between mb-2">
                                        <span>💰 سعر المنتج:</span>
                                        <span>${finalPrice.toLocaleString()} دج</span>
                                    </div>
                                    <div class="flex justify-between mb-2">
                                        <span>🚚 سعر التوصيل:</span>
                                        <span class="text-orange-400">${shipping} دج</span>
                                    </div>
                                    <div class="flex justify-between pt-3 border-t border-gray-600 text-lg font-bold">
                                        <span>💎 المجموع الكلي:</span>
                                        <span class="text-yellow-400">${Math.round(total).toLocaleString()} دج</span>
                                    </div>
                                </div>
                            ` : ''}
                            
                            <button id="submitBtn" class="w-full bg-gradient-to-r from-green-600 to-emerald-700 text-white py-3 rounded-xl font-bold text-lg btn-glow">
                                ${formData.loading ? '<span class="loading-spinner"></span> جاري الإرسال...' : '<i class="fab fa-telegram ml-2"></i> تأكيد الطلب'}
                            </button>
                            
                            ${formData.message ? `
                                <div class="text-center p-3 rounded-xl ${formData.message.includes('✅') ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                                    ${formData.message}
                                </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="bg-gray-100 p-4 text-center text-sm text-gray-600">
                <i class="fas fa-lock ml-1"></i> دفع آمن عند الاستلام | توصيل لجميع الولايات الـ 58
            </div>
        </div>
    `;
    
    document.getElementById('root').innerHTML = html;
    
    // ربط الأحداث
    document.getElementById('firstName')?.addEventListener('input', (e) => { formData.firstName = e.target.value; });
    document.getElementById('lastName')?.addEventListener('input', (e) => { formData.lastName = e.target.value; });
    document.getElementById('phone')?.addEventListener('input', (e) => { formData.phone = e.target.value; });
    
    document.getElementById('wilaya')?.addEventListener('change', (e) => {
        formData.wilaya = e.target.value;
        render();
    });
    
    document.querySelectorAll('input[name="delivery"]')?.forEach(radio => {
        radio?.addEventListener('change', (e) => {
            if (e.target.checked) {
                formData.delivery = e.target.value;
                render();
            }
        });
    });
    
    document.getElementById('submitBtn')?.addEventListener('click', submitOrder);
}

// ========== تأكيد الطلب وإرساله ==========
async function submitOrder() {
    if (!formData.firstName.trim()) { 
        formData.message = "❌ الرجاء إدخال الاسم";
        render();
        return;
    }
    if (!formData.lastName.trim()) { 
        formData.message = "❌ الرجاء إدخال اللقب";
        render();
        return;
    }
    if (!formData.phone.trim()) { 
        formData.message = "❌ الرجاء إدخال رقم الهاتف";
        render();
        return;
    }
    if (!formData.wilaya) { 
        formData.message = "❌ الرجاء اختيار الولاية";
        render();
        return;
    }
    
    formData.loading = true;
    formData.message = "";
    render();
    
    const shipping = getShippingPrice(formData.wilaya, formData.delivery);
    const total = finalPrice + shipping;
    
    const sent = await sendToTelegram({
        firstName: formData.firstName,
        lastName: formData.lastName,
        phone: formData.phone,
        state: formData.wilaya,
        deliveryType: formData.delivery,
        shipping: shipping,
        total: total,
        finalPrice: finalPrice,
        productName: PRODUCT.name
    });
    
    formData.loading = false;
    
    if (sent) {
        formData.message = `✅ تم استلام طلبك بنجاح! المجموع: ${Math.round(total).toLocaleString()} دج - سنتصل بك قريباً`;
        // مسح الحقول
        formData.firstName = "";
        formData.lastName = "";
        formData.phone = "";
        formData.wilaya = "";
        formData.delivery = "office";
    } else {
        formData.message = "❌ حدث خطأ، يرجى المحاولة مرة أخرى";
    }
    
    render();
    
    // إخفاء الرسالة بعد 5 ثواني
    setTimeout(() => { 
        formData.message = "";
        render();
    }, 5000);
}

// بدء التطبيق
render();
</script>
